<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none" role="img" aria-label="robokassa-mcp — Robokassa payment gateway exposed to AI agents through MCP">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#F5F1FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0050C8"/>
      <stop offset="1" stop-color="#3C8DFF"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#C26BFF"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1200" height="420" rx="20" fill="url(#bg)"/>

  <!-- decorative orbits -->
  <g stroke="#C7D8FF" stroke-width="1.75" fill="none" opacity="0.7">
    <ellipse cx="600" cy="210" rx="480" ry="130"/>
    <ellipse cx="600" cy="210" rx="340" ry="85"/>
    <ellipse cx="600" cy="210" rx="210" ry="48"/>
  </g>

  <!-- soft color blobs -->
  <g filter="url(#soft)" opacity="0.55">
    <circle cx="180" cy="100" r="90" fill="#B9D1FF"/>
    <circle cx="1020" cy="340" r="120" fill="#DCC6FF"/>
    <circle cx="600" cy="390" r="80" fill="#FFCCDD" opacity="0.6"/>
  </g>

  <!-- LEFT: Robokassa payment card -->
  <g transform="translate(156,150)">
    <rect x="0" y="0" width="240" height="150" rx="24" fill="url(#card)"/>
    <rect x="0" y="0" width="240" height="150" rx="24" fill="#fff" opacity="0.06"/>
    <!-- shine -->
    <path d="M0 0 L240 0 L240 40 L0 120 Z" fill="#fff" opacity="0.08"/>
    <!-- chip -->
    <rect x="26" y="36" width="40" height="28" rx="6" fill="#FFD75A"/>
    <rect x="26" y="36" width="40" height="28" rx="6" fill="#000" opacity="0.12"/>
    <!-- lines -->
    <rect x="26" y="80" width="110" height="10" rx="5" fill="#fff" opacity="0.9"/>
    <rect x="26" y="100" width="70" height="7" rx="3.5" fill="#fff" opacity="0.6"/>
    <!-- circles (Mastercard-like) -->
    <circle cx="190" cy="104" r="18" fill="#fff" opacity="0.85"/>
    <circle cx="210" cy="104" r="18" fill="#fff" opacity="0.55"/>
    <!-- label -->
    <text x="26" y="26" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" opacity="0.95">Robokassa</text>
  </g>

  <!-- BRIDGE: MCP chain -->
  <g transform="translate(430,206)" stroke="url(#violet)" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M0 4 L50 4"/>
    <circle cx="64" cy="4" r="13" fill="#fff" stroke="#7C4DFF" stroke-width="4"/>
    <path d="M78 4 L128 4"/>
    <circle cx="142" cy="4" r="13" fill="#fff" stroke="#7C4DFF" stroke-width="4"/>
    <path d="M156 4 L206 4"/>
    <circle cx="220" cy="4" r="13" fill="#fff" stroke="#7C4DFF" stroke-width="4"/>
    <path d="M234 4 L290 4"/>
  </g>
  <text x="586" y="176" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800" letter-spacing="2" fill="#7C4DFF" text-anchor="middle">MODEL CONTEXT PROTOCOL</text>

  <!-- RIGHT: AI agent hexagon -->
  <g transform="translate(770,150)">
    <polygon points="100,0 188,50 188,140 100,190 12,140 12,50" fill="url(#agent)"/>
    <polygon points="100,0 188,50 188,140 100,190 12,140 12,50" fill="url(#violet)" opacity="0.3"/>
    <polygon points="100,0 188,50 188,140 100,190 12,140 12,50" stroke="#fff" stroke-width="1" opacity="0.25" fill="none"/>
    <text x="100" y="108" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="46" fill="#fff">AI</text>
    <text x="100" y="136" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" font-size="13" fill="#fff" opacity="0.75">agent</text>
  </g>

  <!-- caption -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
    <text x="600" y="358" font-size="28" font-weight="800" fill="#0F172A">robokassa-mcp</text>
    <text x="600" y="384" font-size="14" font-weight="500" fill="#475569">Robokassa payment gateway — exposed to any MCP-aware agent.</text>
  </g>
</svg>
