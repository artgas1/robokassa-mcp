name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run full test suite before releasing
        run: uv run pytest -m "not integration"

      - name: Build sdist + wheel
        run: uv build --no-sources

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/robokassa-mcp/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via uv (OIDC)
        run: uv publish --trusted-publishing always

  mcp-registry-publish:
    name: Publish to MCP Registry
    needs: pypi-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download mcp-publisher
        run: |
          curl -L -o mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz
          tar -xzf mcp-publisher.tar.gz
          chmod +x ./mcp-publisher

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
